<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Rübik Küp Çözücü</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- OrbitControls -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111827;
            touch-action: none;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .ui-layer {
            position: absolute;
            z-index: 10;
            pointer-events: none;
        }

        .ui-element {
            pointer-events: auto;
        }

        /* 2D Net Styles */
        .color-cell {
            cursor: pointer;
            transition: transform 0.1s;
        }

        .color-cell:active {
            transform: scale(0.9);
        }

        .face-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
            background: #000;
            padding: 2px;
            border-radius: 4px;
            width: 5rem;
            height: 5rem;
        }

        /* Scrollbar styling for modal */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1f2937;
        }

        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 4px;
        }
    </style>
</head>

<body class="text-white antialiased font-sans">

    <!-- 3D Canvas -->
    <div id="canvas-container"></div>

    <!-- Başlık -->
    <div class="ui-layer top-4 left-0 w-full flex justify-center">
        <h1
            class="ui-element text-xl sm:text-2xl md:text-3xl font-bold bg-black/60 px-6 py-2 rounded-full backdrop-blur shadow-lg border border-white/10">
            3D Rübik Küp Çözücü
        </h1>
    </div>

    <!-- Ana Kontroller (Boştayken) -->
    <div class="ui-layer bottom-8 left-0 w-full flex flex-col sm:flex-row items-center justify-center gap-4 px-4"
        id="main-controls">
        <button onclick="openInputModal()"
            class="ui-element flex items-center gap-2 px-6 py-3 bg-blue-600 hover:bg-blue-500 rounded-xl shadow-lg font-bold transition w-full sm:w-auto justify-center">
            <i data-lucide="scan-line"></i> Kamera / Manuel Giriş
        </button>
        <button onclick="scrambleCube()"
            class="ui-element flex items-center gap-2 px-6 py-3 bg-purple-600 hover:bg-purple-500 rounded-xl shadow-lg font-bold transition w-full sm:w-auto justify-center">
            <i data-lucide="shuffle"></i> Rastgele Karıştır
        </button>
    </div>

    <!-- Çözüm Oynatma Kontrolleri -->
    <div class="ui-layer bottom-8 left-0 w-full flex flex-col items-center gap-4 hidden px-4" id="playback-controls">
        <div class="ui-element bg-black/80 px-6 py-3 rounded-xl text-2xl font-mono backdrop-blur border border-white/20 shadow-xl"
            id="current-move-display">
            Çözüm Bekleniyor
        </div>
        <div
            class="ui-element flex gap-2 sm:gap-4 bg-black/70 p-2 sm:p-3 rounded-full backdrop-blur border border-white/20 shadow-xl">
            <button onclick="prevMove()"
                class="p-3 sm:p-4 hover:bg-gray-700 rounded-full transition active:scale-95 text-white"><i
                    data-lucide="skip-back"></i></button>
            <button onclick="togglePlay()"
                class="p-3 sm:p-4 hover:bg-gray-700 rounded-full transition active:scale-95 text-white" id="play-btn"><i
                    data-lucide="play"></i></button>
            <button onclick="nextMove()"
                class="p-3 sm:p-4 hover:bg-gray-700 rounded-full transition active:scale-95 text-white"><i
                    data-lucide="skip-forward"></i></button>
            <div class="w-px h-10 bg-gray-500 my-auto mx-1"></div>
            <button onclick="resetSolve()"
                class="p-3 sm:p-4 hover:bg-red-600 rounded-full transition active:scale-95 text-white" title="Çıkış"><i
                    data-lucide="x"></i></button>
        </div>
    </div>

    <!-- Veri Girişi Modalı (Kamera & 2D Harita) -->
    <div id="input-modal"
        class="ui-element fixed inset-0 bg-gray-900/95 z-50 hidden flex-col items-center justify-start overflow-y-auto pt-8 pb-20">
        <div class="w-full max-w-5xl px-4 mb-6 flex justify-between items-center">
            <div>
                <h2 class="text-2xl sm:text-3xl font-bold">Küp Durumu Girişi</h2>
                <p class="text-gray-400 text-sm mt-1">Standart Dizilim: Üst Beyaz, Ön Yeşil tutularak</p>
            </div>
            <button onclick="closeInputModal()" class="p-2 bg-gray-800 hover:bg-red-600 rounded-lg transition"><i
                    data-lucide="x"></i></button>
        </div>

        <div class="w-full max-w-6xl px-4 flex flex-col lg:flex-row gap-8 justify-center items-start">

            <!-- Sol: 2D Harita -->
            <div
                class="flex flex-col items-center bg-gray-800 border border-gray-700 p-4 sm:p-6 rounded-2xl w-full lg:w-1/2 shadow-2xl">
                <h3 class="text-lg font-bold mb-2 flex items-center gap-2"><i data-lucide="edit-3"></i> 2D Manuel Giriş
                </h3>
                <p class="text-sm text-gray-400 mb-6 text-center">Rengi değiştirmek için karelere tıklayın.</p>

                <!-- Küp Haritası -->
                <div class="flex flex-col items-center select-none" id="cube-net-container">
                    <!-- Dinamik olarak JS ile doldurulacak -->
                </div>

                <div class="mt-8 w-full flex flex-col gap-3">
                    <button onclick="solveFromNet()"
                        class="px-6 py-4 bg-green-600 hover:bg-green-500 rounded-xl font-bold text-lg w-full shadow-lg transition flex items-center justify-center gap-2">
                        <i data-lucide="check-circle"></i> Çözümü Bul
                    </button>
                    <button onclick="resetNetColors()"
                        class="px-6 py-3 bg-gray-700 hover:bg-gray-600 rounded-xl font-bold w-full transition text-sm">
                        Renkleri Sıfırla
                    </button>
                </div>
            </div>

            <!-- Sağ: Kamera -->
            <div
                class="flex flex-col items-center bg-gray-800 border border-gray-700 p-4 sm:p-6 rounded-2xl w-full lg:w-1/2 shadow-2xl">
                <h3 class="text-lg font-bold mb-2 flex items-center gap-2"><i data-lucide="camera"></i> Kamera ile
                    Tarama</h3>
                <p class="text-sm text-gray-400 mb-6 text-center">Kamerayı küp yüzüne ortalayın ve yakalayın.</p>

                <div
                    class="relative w-full max-w-sm aspect-square bg-black rounded-xl overflow-hidden border-2 border-gray-600 shadow-inner">
                    <video id="cam-video" class="absolute inset-0 w-full h-full object-cover" autoplay
                        playsinline></video>
                    <canvas id="cam-canvas" class="hidden"></canvas>

                    <!-- 3x3 Kamera Kılavuzu -->
                    <div class="absolute inset-0 grid grid-cols-3 grid-rows-3 p-8 gap-4 pointer-events-none">
                        <div class="border-2 border-white/50 rounded-lg shadow-[0_0_10px_rgba(0,0,0,0.5)]"></div>
                        <div class="border-2 border-white/50 rounded-lg shadow-[0_0_10px_rgba(0,0,0,0.5)]"></div>
                        <div class="border-2 border-white/50 rounded-lg shadow-[0_0_10px_rgba(0,0,0,0.5)]"></div>
                        <div class="border-2 border-white/50 rounded-lg shadow-[0_0_10px_rgba(0,0,0,0.5)]"></div>
                        <div
                            class="border-2 border-red-500/80 rounded-lg shadow-[0_0_10px_rgba(0,0,0,0.5)] flex items-center justify-center">
                            <div class="w-2 h-2 bg-red-500 rounded-full"></div>
                        </div>
                        <div class="border-2 border-white/50 rounded-lg shadow-[0_0_10px_rgba(0,0,0,0.5)]"></div>
                        <div class="border-2 border-white/50 rounded-lg shadow-[0_0_10px_rgba(0,0,0,0.5)]"></div>
                        <div class="border-2 border-white/50 rounded-lg shadow-[0_0_10px_rgba(0,0,0,0.5)]"></div>
                        <div class="border-2 border-white/50 rounded-lg shadow-[0_0_10px_rgba(0,0,0,0.5)]"></div>
                    </div>
                </div>

                <div class="mt-6 w-full max-w-sm flex gap-2">
                    <select id="cam-face-select"
                        class="flex-1 bg-gray-900 border border-gray-600 p-3 rounded-xl font-bold outline-none text-center">
                        <option value="U">Üst Yüz (U - Beyaz Merkez)</option>
                        <option value="F">Ön Yüz (F - Yeşil Merkez)</option>
                        <option value="R">Sağ Yüz (R - Kırmızı Merkez)</option>
                        <option value="B">Arka Yüz (B - Mavi Merkez)</option>
                        <option value="L">Sol Yüz (L - Turuncu Merkez)</option>
                        <option value="D">Alt Yüz (D - Sarı Merkez)</option>
                    </select>
                </div>
                <button onclick="captureFace()"
                    class="mt-3 w-full max-w-sm px-6 py-4 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold text-lg shadow-lg transition flex justify-center items-center gap-2">
                    <i data-lucide="aperture"></i> Bu Yüzü Yakala
                </button>
            </div>

        </div>
    </div>

    <!-- Yükleniyor Ekranı -->
    <div id="loading" class="ui-element fixed inset-0 bg-black/90 z-[100] flex flex-col items-center justify-center">
        <i data-lucide="loader-2" class="animate-spin text-blue-500 w-16 h-16 mb-6"></i>
        <span class="text-2xl font-bold tracking-wider" id="loading-text">Algoritma Hazırlanıyor...</span>
    </div>

    <!-- Uyarı Mesajı Kutusui -->
    <div id="toast"
        class="ui-element fixed top-20 left-1/2 transform -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-lg shadow-2xl z-[200] font-bold opacity-0 transition-opacity duration-300 pointer-events-none">
        Uyarı Mesajı
    </div>

    <script>
        // İkonları Başlat
        lucide.createIcons();

        /* ============================================================
           Global Değişkenler ve Renk Tanımları
        ============================================================ */
        const hexColors = {
            white: 0xFFFFFF,
            yellow: 0xEAB308,
            green: 0x22C55E,
            blue: 0x3B82F6,
            red: 0xEF4444,
            orange: 0xF97316
        };

        const cssColors = {
            white: '#FFFFFF',
            yellow: '#EAB308',
            green: '#22C55E',
            blue: '#3B82F6',
            red: '#EF4444',
            orange: '#F97316'
        };

        // Küpün standart renk dizilimi (U=Beyaz, D=Sarı, F=Yeşil, B=Mavi, R=Kırmızı, L=Turuncu)
        const faceColors = { 'U': 'white', 'D': 'yellow', 'F': 'green', 'B': 'blue', 'R': 'red', 'L': 'orange' };
        const colorList = ['white', 'yellow', 'green', 'blue', 'red', 'orange'];

        // 3D Küp Değişkenleri
        let scene, camera, renderer, orbitControls;
        let cubies = []; // 27 küçük küp parçası
        let isAnimating = false;

        // Mantıksal Küp (Cube.js instance)
        let logicCube = null;
        let solutionMoves = [];
        let currentMoveIndex = 0;
        let isPlaying = false;
        let playInterval = null;

        /* ============================================================
           Three.js Kurulumu (3D Motor)
        ============================================================ */
        function initThreeJS() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111827); // Tailwind gray-900

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(5, 5, 6);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            orbitControls = new THREE.OrbitControls(camera, renderer.domElement);
            orbitControls.enablePan = false;
            orbitControls.minDistance = 4;
            orbitControls.maxDistance = 15;

            // Işıklar
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);

            build3DCube();

            window.addEventListener('resize', onWindowResize, false);
            animate3D();
        }

        function build3DCube() {
            // Var olan küpleri temizle
            cubies.forEach(c => scene.remove(c));
            cubies = [];

            const spacing = 1.05;
            const geo = new THREE.BoxGeometry(1, 1, 1);

            // Materyal sıralaması (BoxGeometry): +x, -x, +y, -y, +z, -z
            // Bizim eksenlerimiz: +x=R, -x=L, +y=U, -y=D, +z=F, -z=B
            for (let x = -1; x <= 1; x++) {
                for (let y = -1; y <= 1; y++) {
                    for (let z = -1; z <= 1; z++) {
                        const materials = [
                            createMaterial(x === 1 ? hexColors.red : 0x222222),    // Right
                            createMaterial(x === -1 ? hexColors.orange : 0x222222),// Left
                            createMaterial(y === 1 ? hexColors.white : 0x222222),  // Up
                            createMaterial(y === -1 ? hexColors.yellow : 0x222222),// Down
                            createMaterial(z === 1 ? hexColors.green : 0x222222),  // Front
                            createMaterial(z === -1 ? hexColors.blue : 0x222222)   // Back
                        ];

                        const mesh = new THREE.Mesh(geo, materials);
                        mesh.position.set(x * spacing, y * spacing, z * spacing);

                        // Siyah Çerçeveler
                        const edges = new THREE.EdgesGeometry(geo);
                        const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 4 }));
                        mesh.add(line);

                        scene.add(mesh);
                        cubies.push(mesh);
                    }
                }
            }
        }

        function createMaterial(colorHex) {
            return new THREE.MeshPhongMaterial({
                color: colorHex,
                shininess: 50,
                polygonOffset: true,
                polygonOffsetFactor: 1,
                polygonOffsetUnits: 1
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate3D() {
            requestAnimationFrame(animate3D);
            orbitControls.update();
            renderer.render(scene, camera);
        }

        /* ============================================================
           Döndürme Mantığı (Three.js Animasyon)
        ============================================================ */
        const moveDefinitions = {
            'R': { axis: 'x', layer: 1, angle: -Math.PI / 2 },
            'L': { axis: 'x', layer: -1, angle: Math.PI / 2 },
            'U': { axis: 'y', layer: 1, angle: -Math.PI / 2 },
            'D': { axis: 'y', layer: -1, angle: Math.PI / 2 },
            'F': { axis: 'z', layer: 1, angle: -Math.PI / 2 },
            'B': { axis: 'z', layer: -1, angle: Math.PI / 2 },
        };

        function parseMove(moveStr) {
            if (!moveStr) return null;
            const base = moveStr[0];
            const mod = moveStr.length > 1 ? moveStr[1] : '';
            const def = { ...moveDefinitions[base] };

            if (mod === "'") def.angle *= -1; // Ters yön
            if (mod === "2") def.angle *= 2;  // Çift dönüş

            return def;
        }

        function rotateLayer(moveStr, duration = 300) {
            return new Promise(resolve => {
                if (isAnimating) { resolve(); return; }
                const def = parseMove(moveStr);
                if (!def) { resolve(); return; }

                isAnimating = true;
                const pivot = new THREE.Object3D();
                pivot.rotation.set(0, 0, 0);
                pivot.updateMatrixWorld();
                scene.add(pivot);

                const activeCubies = [];
                const spacing = 1.05;
                const targetPos = def.layer * spacing;

                cubies.forEach(c => {
                    // Kayma payı bırakarak konum kontrolü
                    if (Math.abs(c.position[def.axis] - targetPos) < 0.5) {
                        activeCubies.push(c);
                        pivot.attach(c);
                    }
                });

                if (duration <= 0) {
                    pivot.rotation[def.axis] = def.angle;
                    pivot.updateMatrixWorld();
                    activeCubies.forEach(c => scene.attach(c));
                    snapCubies();
                    scene.remove(pivot);
                    isAnimating = false;
                    resolve();
                } else {
                    const startTime = performance.now();
                    function tween(time) {
                        let t = (time - startTime) / duration;
                        if (t >= 1) t = 1;

                        // Ease In-Out
                        const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
                        pivot.rotation[def.axis] = def.angle * ease;

                        if (t < 1) {
                            requestAnimationFrame(tween);
                        } else {
                            pivot.rotation[def.axis] = def.angle;
                            pivot.updateMatrixWorld();
                            activeCubies.forEach(c => scene.attach(c));
                            snapCubies();
                            scene.remove(pivot);
                            isAnimating = false;
                            resolve();
                        }
                    }
                    requestAnimationFrame(tween);
                }
            });
        }

        function snapCubies() {
            const spacing = 1.05;
            cubies.forEach(c => {
                c.position.x = Math.round(c.position.x / spacing) * spacing;
                c.position.y = Math.round(c.position.y / spacing) * spacing;
                c.position.z = Math.round(c.position.z / spacing) * spacing;

                c.rotation.x = Math.round(c.rotation.x / (Math.PI / 2)) * (Math.PI / 2);
                c.rotation.y = Math.round(c.rotation.y / (Math.PI / 2)) * (Math.PI / 2);
                c.rotation.z = Math.round(c.rotation.z / (Math.PI / 2)) * (Math.PI / 2);
            });
        }

        function invertSequence(seqStr) {
            if (!seqStr) return [];
            return seqStr.split(' ').reverse().map(move => {
                if (move.includes("'")) return move.replace("'", "");
                if (move.includes("2")) return move;
                return move + "'";
            });
        }

        /* ============================================================
           Uygulama Mantığı ve Çözücü
        ============================================================ */
        async function scrambleCube() {
            if (isAnimating || isPlaying) return;
            // Cube.js rastgele karıştırma (20 hamlelik)
            logicCube = Cube.random();
            const scrambleMoves = logicCube.solve().split(' '); // Mantığı düzeltmek için: küpü çözüp tersini uygulayalım.
            // Aslında rastgele karma için algoritmanın ürettiği çözümün TERSİ bir karıştırmadır.
            const scrambleSeq = invertSequence(logicCube.solve());

            build3DCube(); // Sıfırla
            document.getElementById('main-controls').classList.add('hidden');

            for (let move of scrambleSeq) {
                await rotateLayer(move, 100);
            }

            setupSolveState();
        }

        function setupSolveState() {
            if (!logicCube) logicCube = new Cube();
            const solutionStr = logicCube.solve();

            solutionMoves = solutionStr ? solutionStr.split(' ') : [];
            currentMoveIndex = 0;

            document.getElementById('main-controls').classList.add('hidden');
            document.getElementById('playback-controls').classList.remove('hidden');
            updateMoveDisplay();
        }

        function updateMoveDisplay() {
            const display = document.getElementById('current-move-display');
            if (solutionMoves.length === 0) {
                display.innerText = "Küp Zaten Çözülü!";
                display.className = "ui-element bg-green-600/90 px-6 py-3 rounded-xl text-2xl font-mono backdrop-blur text-white";
                return;
            }
            if (currentMoveIndex >= solutionMoves.length) {
                display.innerText = "Çözüm Tamamlandı!";
                display.className = "ui-element bg-green-600/90 px-6 py-3 rounded-xl text-2xl font-mono backdrop-blur text-white";
                pausePlay();
                return;
            }

            display.className = "ui-element bg-black/80 px-6 py-3 rounded-xl text-2xl font-mono backdrop-blur border border-white/20 shadow-xl text-yellow-400";
            display.innerText = `Adım ${currentMoveIndex + 1}/${solutionMoves.length}: ${solutionMoves[currentMoveIndex]}`;
        }

        async function nextMove() {
            if (isAnimating || currentMoveIndex >= solutionMoves.length) return;
            const move = solutionMoves[currentMoveIndex];
            logicCube.move(move); // Mantığı güncelle
            currentMoveIndex++;
            updateMoveDisplay();
            await rotateLayer(move, 300);
        }

        async function prevMove() {
            if (isAnimating || currentMoveIndex <= 0) return;
            currentMoveIndex--;
            const move = solutionMoves[currentMoveIndex];
            const invMove = invertSequence(move)[0];
            logicCube.move(invMove); // Mantığı geri al
            updateMoveDisplay();
            await rotateLayer(invMove, 300);
        }

        function togglePlay() {
            const icon = document.querySelector('#play-btn i');
            if (isPlaying) {
                pausePlay();
            } else {
                isPlaying = true;
                icon.setAttribute('data-lucide', 'pause');
                lucide.createIcons();
                playLoop();
            }
        }

        function pausePlay() {
            isPlaying = false;
            const icon = document.querySelector('#play-btn i');
            icon.setAttribute('data-lucide', 'play');
            lucide.createIcons();
        }

        async function playLoop() {
            if (!isPlaying) return;
            if (currentMoveIndex < solutionMoves.length) {
                await nextMove();
                setTimeout(playLoop, 100); // Adımlar arası bekleme
            } else {
                pausePlay();
            }
        }

        function resetSolve() {
            pausePlay();
            build3DCube();
            logicCube = new Cube(); // Çözülü durum
            document.getElementById('playback-controls').classList.add('hidden');
            document.getElementById('main-controls').classList.remove('hidden');
        }

        /* ============================================================
           2D Net (Manuel Giriş) Mantığı
        ============================================================ */
        // Net verisi (6 yüz, her biri 9 kare)
        let netState = {
            U: Array(9).fill('white'),
            L: Array(9).fill('orange'),
            F: Array(9).fill('green'),
            R: Array(9).fill('red'),
            B: Array(9).fill('blue'),
            D: Array(9).fill('yellow')
        };

        function build2DNet() {
            const container = document.getElementById('cube-net-container');
            container.innerHTML = '';

            const layout = [
                [null, 'U', null, null],
                ['L', 'F', 'R', 'B'],
                [null, 'D', null, null]
            ];

            layout.forEach(row => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'flex gap-1 mb-1';
                row.forEach(face => {
                    if (!face) {
                        const empty = document.createElement('div');
                        empty.className = 'w-20 h-20 sm:w-24 sm:h-24'; // placeholder
                        rowDiv.appendChild(empty);
                    } else {
                        const faceGrid = document.createElement('div');
                        faceGrid.className = 'face-grid w-20 h-20 sm:w-24 sm:h-24';
                        faceGrid.dataset.face = face;

                        for (let i = 0; i < 9; i++) {
                            const cell = document.createElement('div');
                            cell.className = 'color-cell rounded-sm';
                            cell.dataset.face = face;
                            cell.dataset.index = i;
                            cell.style.backgroundColor = cssColors[netState[face][i]];

                            // Merkez hücreleri sabitleyelim veya belirteç koyalım
                            if (i === 4) {
                                cell.style.border = "2px solid rgba(0,0,0,0.5)";
                            }

                            cell.onclick = () => {
                                const currentColor = netState[face][i];
                                const nextColorIndex = (colorList.indexOf(currentColor) + 1) % colorList.length;
                                const nextColor = colorList[nextColorIndex];
                                netState[face][i] = nextColor;
                                cell.style.backgroundColor = cssColors[nextColor];
                            };
                            faceGrid.appendChild(cell);
                        }
                        rowDiv.appendChild(faceGrid);
                    }
                });
                container.appendChild(rowDiv);
            });
        }

        function resetNetColors() {
            netState = {
                U: Array(9).fill('white'),
                L: Array(9).fill('orange'),
                F: Array(9).fill('green'),
                R: Array(9).fill('red'),
                B: Array(9).fill('blue'),
                D: Array(9).fill('yellow')
            };
            build2DNet();
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.opacity = 1;
            setTimeout(() => { toast.style.opacity = 0; }, 3000);
        }

        async function solveFromNet() {
            // NetState'i Kociemba String'e çevir
            // Önce merkez renklerine bakarak hangi rengin hangi yüze ait olduğunu bulalım.
            const centerColors = {
                U: netState.U[4], R: netState.R[4], F: netState.F[4],
                D: netState.D[4], L: netState.L[4], B: netState.B[4]
            };

            // Renkten -> Yüz Harfine eşleme (Örn: 'white' -> 'U')
            const colorToFaceStr = {};
            for (const [face, col] of Object.entries(centerColors)) {
                colorToFaceStr[col] = face;
            }

            // String Oluşturma Sırası: U, R, F, D, L, B
            const order = ['U', 'R', 'F', 'D', 'L', 'B'];
            let stateStr = "";

            try {
                for (const face of order) {
                    for (let i = 0; i < 9; i++) {
                        const cellColor = netState[face][i];
                        const faceChar = colorToFaceStr[cellColor];
                        if (!faceChar) throw new Error(`Geçersiz veya eksik renk: ${cellColor}`);
                        stateStr += faceChar;
                    }
                }

                // Geçerlilik kontrolü (Her harften tam 9 tane olmalı)
                const counts = {};
                for (let char of stateStr) counts[char] = (counts[char] || 0) + 1;
                for (const face of order) {
                    if (counts[face] !== 9) throw new Error("Renk sayıları hatalı! Her renkten tam 9 adet olmalı.");
                }

                // Çözücüye ver
                const newCube = Cube.fromString(stateStr);
                const solutionStr = newCube.solve(); // Algoritma çalışır

                // Başarılı!
                closeInputModal();

                // 3D Ekranı Kullanıcının girdiği hale getir:
                // Bunun en güvenli yolu, çözülmüş 3D küpe Çözümün TERSİNİ anında uygulamaktır.
                build3DCube();
                const invSeq = invertSequence(solutionStr);
                for (let move of invSeq) {
                    await rotateLayer(move, 0); // 0 duration = anında
                }

                logicCube = newCube;
                setupSolveState();

            } catch (err) {
                showToast("Hata: " + err.message + " Küp dizilimi imkansız veya eksik.");
                console.warn(err);
            }
        }

        /* ============================================================
           Kamera Entegrasyonu
        ============================================================ */
        let videoStream = null;

        function startCamera() {
            const video = document.getElementById('cam-video');
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                    .then(stream => {
                        videoStream = stream;
                        video.srcObject = stream;
                    })
                    .catch(err => {
                        console.warn("Kamera hatası:", err);
                        showToast("Kameraya erişilemedi. Lütfen manuel girişi kullanın.");
                    });
            }
        }

        function stopCamera() {
            if (videoStream) {
                videoStream.getTracks().forEach(t => t.stop());
                videoStream = null;
            }
        }

        function getClosestColor(r, g, b) {
            // Basit Euclidean Distance
            const rgbTarget = {
                white: [255, 255, 255],
                yellow: [255, 255, 0],
                green: [0, 200, 0],   // Yeşili biraz koyu yapalım daha iyi tutar
                blue: [0, 0, 255],
                red: [255, 0, 0],
                orange: [255, 128, 0]
            };

            let minDist = Infinity;
            let bestCol = 'white';

            for (const [name, [tr, tg, tb]] of Object.entries(rgbTarget)) {
                const dist = Math.pow(r - tr, 2) + Math.pow(g - tg, 2) + Math.pow(b - tb, 2);
                if (dist < minDist) {
                    minDist = dist;
                    bestCol = name;
                }
            }
            return bestCol;
        }

        function captureFace() {
            const video = document.getElementById('cam-video');
            const canvas = document.getElementById('cam-canvas');
            if (!video.videoWidth) {
                showToast("Kamera henüz hazır değil.");
                return;
            }

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Görüntünün ortasındaki 3x3 kare alanından örneklem al.
            // Bizim CSS grid tam kare ve merkeze oturuyor.
            const size = Math.min(canvas.width, canvas.height);
            const offsetX = (canvas.width - size) / 2;
            const offsetY = (canvas.height - size) / 2;

            // 3'e böl
            const step = size / 3;

            const selectedFace = document.getElementById('cam-face-select').value;
            const capturedColors = [];

            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 3; col++) {
                    // Her bloğun merkezi
                    const px = offsetX + col * step + step / 2;
                    const py = offsetY + row * step + step / 2;

                    const pixel = ctx.getImageData(px, py, 1, 1).data;
                    const colorName = getClosestColor(pixel[0], pixel[1], pixel[2]);
                    capturedColors.push(colorName);
                }
            }

            // Gelişmiş Not: Işıklandırma sorunları nedeniyle kamera çok hatalı olabilir.
            // Bu yüzden capturedColors'ı netState'e atıp UI'ı güncelliyoruz, kullanıcı düzeltebilsin.
            netState[selectedFace] = capturedColors;
            build2DNet();
            showToast(`${selectedFace} Yüzü yakalandı. Haritadan kontrol edin.`);

            // Otomatik sonraki yüze geç
            const select = document.getElementById('cam-face-select');
            if (select.selectedIndex < 5) select.selectedIndex++;
        }

        /* ============================================================
           UI Kontrolleri
        ============================================================ */
        function openInputModal() {
            build2DNet();
            document.getElementById('input-modal').classList.remove('hidden');
            document.getElementById('input-modal').classList.add('flex');
            startCamera();
        }

        function closeInputModal() {
            document.getElementById('input-modal').classList.add('hidden');
            document.getElementById('input-modal').classList.remove('flex');
            stopCamera();
        }

        // Başlangıç: Cube.js'i Başlat
        window.onload = async () => {
            initThreeJS();

            try {
                // esm.sh yerine daha kararlı olan jsDelivr ESM CDN'ini kullanıyoruz.
                // Ağ kısıtlamalarına karşı jspm.dev'i yedek olarak ekliyoruz.
                let CubeModule;
                try {
                    CubeModule = await import('https://cdn.jsdelivr.net/npm/cubejs@1.2.2/+esm');
                } catch (e1) {
                    console.warn("jsDelivr yüklenemedi, alternatif deneniyor...", e1);
                    CubeModule = await import('https://jspm.dev/cubejs');
                }

                window.Cube = CubeModule.default || CubeModule.Cube || CubeModule;

                // Cube.js Kociemba lookup tablolarını hazırlar (Biraz sürebilir)
                setTimeout(() => {
                    try {
                        Cube.initSolver();
                        document.getElementById('loading').classList.add('hidden');
                    } catch (e) {
                        console.error("Çözücü başlatılamadı:", e);
                        document.getElementById('loading-text').innerText = "Hata: Algoritma Başlatılamadı";
                    }
                }, 100);
            } catch (err) {
                console.error("Kütüphane yüklenemedi:", err);
                document.getElementById('loading-text').innerText = "Hata: Kütüphane Yüklenemedi";
            }
        };

    </script>
